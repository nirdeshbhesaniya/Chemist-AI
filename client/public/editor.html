<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Structure Editor</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
        #jsme_container { width: 100%; height: 100%; }
        .wrapper { width: 100%; height: 100%; display: flex; flex-direction: column; }
    </style>
    <!-- JSME script from CDN for fast and robust drawing -->
    <script type="text/javascript" language="javascript" src="https://jsme-editor.github.io/dist/jsme/jsme.nocache.js"></script>
</head>
<body>
    <div class="wrapper">
        <div id="jsme_container"></div>
    </div>
    <script>
        // Initialize JSME
        function jsmeOnLoad() {
            var width = window.innerWidth || '100%';
            var height = window.innerHeight || '400px';
            var jsmeApplet = new JSApplet.JSME("jsme_container", "100%", "100%", {
                "options": "oldlook,star,nocanonize,border"
            });
            
            window.getSmiles = function() {
                return jsmeApplet.smiles();
            };
        }

        // Listen for requests from React wrapper
        window.addEventListener('message', function(e) {
            if (e.data && e.data.type === 'cmd' && e.data.value === 'getSmiles') {
                if (window.getSmiles) {
                    var smiles = window.getSmiles();
                    window.parent.postMessage({ type: 'smiles', value: smiles }, '*');
                }
            }
        });
    </script>
</body>
</html>
